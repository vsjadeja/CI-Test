name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache-dependency-path: src/go.sum
    
    - name: Run tests with coverage
      run: |
        cd src
        go test -v -coverprofile=coverage.out ./...
        go tool cover -func=coverage.out
    
    - name: Calculate coverage percentage
      id: coverage
      run: |
        cd src
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "Coverage: $COVERAGE%"
    
    - name: Check coverage threshold
      run: |
        COVERAGE=${{ steps.coverage.outputs.coverage }}
        if (( $(echo "$COVERAGE < 60" | bc -l) )); then
          echo "::error::Code coverage ($COVERAGE%) is below the required 60% threshold"
          exit 1
        else
          echo "✓ Code coverage ($COVERAGE%) meets the 60% threshold"
        fi
    
    - name: Build project
      run: |
        cd src
        go build -o ../build/ci-test .
        echo "✓ Build successful - output: build/ci-test"
    
    - name: Commit build artifacts
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add build/ci-test
        git commit -m "CI: Build artifact updated" || echo "No changes to commit"
    
    - name: Push build artifacts
      run: |
        git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
